<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta charset="UTF-8">
<title>棚卸OCR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #e8edf5; min-height: 100vh; padding: 12px; }
.container { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.14); transition: background 0.4s; }
.container.flash-ok  { background: #d4ffd4; }
.container.flash-err { background: #ffd4d4; }
h2 { text-align: center; font-size: 20px; font-weight: 700; color: #222; margin-bottom: 12px; }

/* カメラ枠 */
.camera-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #111; margin-bottom: 8px; }
video { width: 100%; display: block; max-height: 280px; object-fit: cover; }

/* ガイド枠 */
.guide { position: absolute; left: 8%; width: 84%; top: 25%; height: 50%; border: 2.5px solid #00ff88; border-radius: 8px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.4); pointer-events: none; }
.guide.scanning::after { content: ''; position: absolute; left: 0; right: 0; height: 2px; background: #00ff88; animation: scan 1s ease-in-out infinite; }
@keyframes scan { 0%{top:0;opacity:1} 90%{top:calc(100% - 2px);opacity:1} 100%{top:calc(100% - 2px);opacity:0} }

/* 図番入力 */
.part-wrap { margin: 10px 0 4px; }
.part-label { font-size: 11px; color: #888; margin-bottom: 3px; }
#partInput { width: 100%; font-size: 28px; font-weight: 800; text-align: center; letter-spacing: 2px; background: #111; color: #00ff88; border: 2px solid transparent; border-radius: 10px; padding: 8px; outline: none; font-family: monospace; }
#partInput:focus  { border-color: #00ff88; }
#partInput.notfound { color: #ff5555; }
#partInput.editing  { border-color: #ffaa00; color: #ffaa00; }
.part-hint { font-size: 11px; color: #888; text-align: center; margin-top: 2px; }

/* 品名・サイズ */
.info-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 15px; }
.info-lbl { color: #888; min-width: 50px; }
.info-val { color: #222; font-weight: 600; }

/* 数量 */
.qty-row { margin: 10px 0 8px; display: flex; align-items: center; gap: 10px; }
.qty-row label { font-size: 15px; color: #555; white-space: nowrap; }
.qty-row input { width: 120px; padding: 10px; font-size: 22px; font-weight: 700; border: 2px solid #ccc; border-radius: 10px; text-align: center; outline: none; }
.qty-row input:focus { border-color: #4477ff; }

/* プルダウンセクション */
.dropdown-section { margin: 10px 0 8px; padding: 12px; background: #f8f9fc; border-radius: 12px; border: 1px solid #e0e4ef; }
.dropdown-section h3 { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
.dd-row { display: flex; flex-direction: column; gap: 8px; }
.dd-item { display: flex; align-items: center; gap: 8px; }
.dd-item label { font-size: 13px; color: #555; min-width: 72px; white-space: nowrap; }
.dd-item select {
  flex: 1;
  padding: 8px 10px;
  font-size: 14px;
  border: 2px solid #dde1ee;
  border-radius: 8px;
  background: #fff;
  color: #222;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24'%3E%3Cpath fill='%23888' d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 8px center;
  padding-right: 28px;
}
.dd-item select:focus { border-color: #4477ff; }

/* ボタン */
button { width: 100%; padding: 14px; font-size: 17px; font-weight: 700; border: none; border-radius: 12px; color: #fff; cursor: pointer; margin-top: 8px; transition: transform 0.1s, opacity 0.1s; }
button:active   { transform: scale(0.97); opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-cam    { background: linear-gradient(135deg, #00b09b, #5cb85c); }
.btn-save   { background: linear-gradient(135deg, #ff8c00, #ffc837); }
.btn-rescan { background: linear-gradient(135deg, #3a5bff, #7b2fff); }

/* ステータス */
.status { margin-top: 10px; padding: 7px 10px; border-radius: 8px; font-size: 12px; text-align: center; background: #f4f4f4; color: #555; min-height: 32px; }
.status.ok   { background: #e0ffe0; color: #1a6e1a; }
.status.err  { background: #ffe0e0; color: #8b0000; }
.status.info { background: #e6f0ff; color: #224499; }

/* 診断エリア */
.diag { display: none; margin-top: 5px; padding: 6px 8px; background: #fff3cd; border-radius: 6px; font-size: 10px; color: #555; word-break: break-all; line-height: 1.5; }

/* デバッグプレビュー */
.debug-wrap { display: none; margin: 6px 0; text-align: center; }
.debug-wrap p { font-size: 10px; color: #888; margin-bottom: 3px; }
#debugCanvas { max-width: 100%; border: 1px solid #ccc; border-radius: 4px; }

/* 成功 */
.success { font-size: 20px; font-weight: 800; text-align: center; color: #1a8a1a; min-height: 28px; margin-top: 6px; }

/* 履歴 */
.history { margin-top: 14px; border-top: 1px solid #eee; padding-top: 10px; }
.history h3 { font-size: 12px; color: #999; margin-bottom: 6px; }
.hist-item { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid #f5f5f5; color: #333; }
.hist-item span:last-child { font-weight: 700; color: #4477ff; }
</style>
</head>
<body>
<div class="container" id="container">
  <h2>棚卸 OCR</h2>

  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide" id="guide"></div>
  </div>

  <button class="btn-cam" id="btnCamera" onclick="startCamera()">📷 カメラ起動</button>

  <div class="debug-wrap" id="debugWrap">
    <p>▼ OCRに送っている画像</p>
    <canvas id="debugCanvas"></canvas>
  </div>

  <div class="part-wrap">
    <div class="part-label">図番</div>
    <input id="partInput" type="text" value="----" readonly
           placeholder="読み取り待ち..."
           oninput="onPartEdit()" onblur="onPartBlur()">
    <div class="part-hint" id="partHint">OCR読み取り後、手修正も可能です</div>
  </div>

  <div class="info-row"><span class="info-lbl">品名</span><span class="info-val" id="infoName">—</span></div>
  <div class="info-row"><span class="info-lbl">サイズ</span><span class="info-val" id="infoSize">—</span></div>

  <div class="qty-row">
    <label for="qty">数量</label>
    <input id="qty" type="number" inputmode="numeric" placeholder="0" min="0">
  </div>

  <!-- ▼ プルダウン追加エリア -->
  <div class="dropdown-section">
    <h3>登録情報</h3>
    <div class="dd-row">
      <div class="dd-item">
        <label for="selDept">棚卸部署</label>
        <select id="selDept"><option value="">— 選択 —</option></select>
      </div>
      <div class="dd-item">
        <label for="selPerson">担当者</label>
        <select id="selPerson"><option value="">— 選択 —</option></select>
      </div>
      <div class="dd-item">
        <label for="selStock">在庫区分</label>
        <select id="selStock"><option value="">— 選択 —</option></select>
      </div>
    </div>
  </div>
  <!-- ▲ プルダウン追加エリア ここまで -->

  <button class="btn-save"   id="btnSave"   onclick="doSave()"      disabled>📦 登録</button>
  <button class="btn-rescan" id="btnRescan" onclick="restartScan()" style="display:none">🔄 再スキャン</button>

  <div class="status" id="statusBar">カメラを起動してください</div>
  <div class="diag"   id="diagArea"></div>
  <div class="success" id="successMsg"></div>

  <div class="history" id="historyArea" style="display:none">
    <h3>登録履歴（今回分）</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ============================================================
//  ★ デプロイURLをここに貼る
// ============================================================
var API = "https://script.google.com/macros/s/AKfycbzUFqgQNVECbf48AUKRQcMF8HMI84DWZZC6dlmogJeWXwwiEHv3X2PUJVnvxB3IRoS-/exec";

// ============================================================
//  状態変数
// ============================================================
var mediaStream   = null;
var scanTimer     = null;
var isScanning    = false;
var cameraReady   = false;
var currentPart   = null;
var currentName   = "";
var currentSize   = "";
var historyLog    = [];

// DOM参照
var video     = document.getElementById("video");
var guide     = document.getElementById("guide");
var partInput = document.getElementById("partInput");
var statusBar = document.getElementById("statusBar");
var diagArea  = document.getElementById("diagArea");
var btnSave   = document.getElementById("btnSave");
var btnRescan = document.getElementById("btnRescan");
var btnCamera = document.getElementById("btnCamera");

// ============================================================
//  ユーティリティ
// ============================================================
function setStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = "status " + (type || "");
}
function setDiag(msg) {
  diagArea.textContent = msg;
  diagArea.style.display = msg ? "block" : "none";
}

// ============================================================
//  プルダウンデータ読み込み（画面起動時に自動実行）
// ============================================================
function loadDropdowns() {
  fetch(API, { method: "POST", body: JSON.stringify({ type: "get_dropdowns" }) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { console.warn("プルダウン取得失敗:", d.message); return; }
      fillSelect("selDept",   d.depts   || []);
      fillSelect("selPerson", d.persons || []);
      fillSelect("selStock",  d.stocks  || []);
    })
    .catch(function(e) { console.warn("プルダウン通信エラー:", e.message); });
}

function fillSelect(id, items) {
  var sel = document.getElementById(id);
  // 既存の「— 選択 —」オプションを残してリセット
  sel.innerHTML = '<option value="">— 選択 —</option>';
  items.forEach(function(v) {
    var opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

// ページ読み込み時にプルダウンを取得
window.addEventListener("load", function() {
  loadDropdowns();
});

// ============================================================
//  カメラ起動
// ============================================================
function startCamera() {
  setStatus("カメラ起動中...", "info");
  btnCamera.disabled = true;
  cameraReady = false;

  var constraints = [
    { video: { facingMode: "environment", aspectRatio: { ideal: 0.5625 } } },
    { video: { facingMode: "environment", width: { ideal: 720 }, height: { ideal: 1280 } } },
    { video: { facingMode: "environment" } }
  ];

  tryGetUserMedia(constraints, 0);
}

function tryGetUserMedia(constraints, idx) {
  if (idx >= constraints.length) {
    setStatus("カメラ起動失敗", "err");
    btnCamera.disabled = false;
    return;
  }

  navigator.mediaDevices.getUserMedia(constraints[idx])
    .then(function(stream) {
      mediaStream = stream;
      video.srcObject = stream;
      video.onloadedmetadata = function() {
        video.play().then(function() {
          cameraReady = true;
          var vw = video.videoWidth, vh = video.videoHeight;
          setStatus("起動: " + vw + "x" + vh + "  ガイド枠に図番を合わせてください", "info");
          setDiag("videoSize: " + vw + "x" + vh + " / constraints[" + idx + "]");
          btnCamera.style.display = "none";
          btnRescan.style.display = "none";
          startAutoScan();
        }).catch(function(e) {
          setStatus("再生失敗: " + e.message, "err");
          btnCamera.disabled = false;
        });
      };
    })
    .catch(function() {
      tryGetUserMedia(constraints, idx + 1);
    });
}

// ============================================================
//  スキャンループ
// ============================================================
function startAutoScan() {
  clearInterval(scanTimer);
  isScanning = false;
  scanTimer = setInterval(doScanTick, 2000);
}

function doScanTick() {
  if (isScanning || !cameraReady || !video.videoWidth) return;
  isScanning = true;
  guide.classList.add("scanning");

  var b64 = capture();
  if (!b64) {
    isScanning = false;
    guide.classList.remove("scanning");
    return;
  }

  setStatus("OCR解析中...", "info");

  fetch(API, { method: "POST", body: JSON.stringify({ type: "ocr_search", image: b64 }) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.diag) setDiag(data.diag.diagText || JSON.stringify(data.diag));

      if (data.part) {
        stopCamera();
        displayPart(data.part);
        applySearchResult(data);
      } else if (data.rawText && data.rawText.trim()) {
        var rv = data.rawText.replace(/\n/g, " ").trim();
        setStatus("OCR生テキスト: [" + rv.substring(0, 60) + "]", "err");
        partInput.value = rv.substring(0, 30);
        partInput.removeAttribute("readonly");
        partInput.className = "editing";
        document.getElementById("partHint").textContent = "図番部分を残して修正 → 外をタップで確定";
        btnSave.disabled = false;
        btnRescan.style.display = "block";
        stopCamera();
      } else {
        setStatus("テキスト未読取 — 明るい場所で図番を合わせてください");
      }
    })
    .catch(function(e) { setStatus("通信エラー: " + e.message, "err"); })
    .finally(function() {
      isScanning = false;
      guide.classList.remove("scanning");
    });
}

// ============================================================
//  画像キャプチャ（iOS縦持ち完全対応版）
//
//  iOSの問題:
//    縦持ちで撮影しても videoWidth > videoHeight（横動画）になる。
//    さらにトラックの getSettings().width/height も横サイズを返す。
//    正しい向きは ImageCapture API または screen.orientation で判定する。
//
//  対策:
//    ① MediaStreamTrack.getSettings() の width/height で実動画サイズ取得
//    ② window.innerWidth < window.innerHeight（縦持ち）かつ vw > vh（横動画）
//       → iOSが時計回り90度で送っていると判断して回転補正
//    ③ それ以外は回転なしで処理（PC・Android・横持ちiOS）
// ============================================================
function capture() {
  var vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return null;

  // ---- 回転判定 ----
  // 画面が縦（portrait）かつ動画が横（landscape）の場合だけ回転補正する
  var screenPortrait = window.innerHeight > window.innerWidth;
  var videoLandscape = vw > vh;
  // iOS縦持ち = portrait && landscape動画
  var needRotate = screenPortrait && videoLandscape;

  // ---- object-fit:cover のスケール・オフセット計算 ----
  var vrect = video.getBoundingClientRect();
  var dispW = vrect.width, dispH = vrect.height;

  // 回転補正がある場合は「論理的な縦横」を入れ替える
  var logW = needRotate ? vh : vw;  // 正立後の幅
  var logH = needRotate ? vw : vh;  // 正立後の高さ

  var scale = Math.max(dispW / logW, dispH / logH);
  var overX = (logW * scale - dispW) / 2;
  var overY = (logH * scale - dispH) / 2;

  // ガイド枠のCSS座標 → 論理ピクセル座標（正立ベース）
  var gr  = guide.getBoundingClientRect();
  var glx = (gr.left - vrect.left + overX) / scale;
  var gly = (gr.top  - vrect.top  + overY) / scale;
  var glw = gr.width  / scale;
  var glh = gr.height / scale;

  // 論理ピクセル → 動画ピクセル（回転補正逆変換）
  var sx, sy, sw, sh;
  if (needRotate) {
    // 時計回り90度で届いているので逆変換（反時計回り90度）
    // 論理(glx, gly, glw, glh) → 動画座標
    // 時計90度の逆: 動画x = gly, 動画y = logW - glx - glw
    sx = Math.round(gly);
    sy = Math.round(logW - glx - glw);
    sw = Math.round(glh);
    sh = Math.round(glw);
  } else {
    sx = Math.round(glx); sy = Math.round(gly);
    sw = Math.round(glw); sh = Math.round(glh);
  }

  // クランプ（範囲外防止）
  sx = Math.max(0, Math.min(vw - 1, sx));
  sy = Math.max(0, Math.min(vh - 1, sy));
  sw = Math.max(1, Math.min(vw - sx, sw));
  sh = Math.max(1, Math.min(vh - sy, sh));

  // ---- Canvas に切り出し（回転補正して正立画像を生成） ----
  var crop = document.createElement("canvas");
  if (needRotate) {
    // 正立後サイズ：切り出し(sw×sh)を時計回り90度回転 → 幅sh, 高さsw
    crop.width  = sh;
    crop.height = sw;
    var rc = crop.getContext("2d");
    rc.translate(sh, 0);
    rc.rotate(Math.PI / 2);
    rc.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
  } else {
    crop.width  = sw;
    crop.height = sh;
    crop.getContext("2d").drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
  }

  // 長辺1000px上限にリサイズ
  var MAX = 1000, out = crop;
  if (crop.width > MAX || crop.height > MAX) {
    var r = Math.min(MAX / crop.width, MAX / crop.height);
    out = document.createElement("canvas");
    out.width  = Math.round(crop.width  * r);
    out.height = Math.round(crop.height * r);
    out.getContext("2d").drawImage(crop, 0, 0, out.width, out.height);
  }

  // デバッグプレビュー
  var dbg = document.getElementById("debugCanvas");
  document.getElementById("debugWrap").style.display = "block";
  dbg.width  = out.width;
  dbg.height = out.height;
  dbg.getContext("2d").drawImage(out, 0, 0);

  var b64 = out.toDataURL("image/jpeg", 0.85).replace(/^data:image\/jpeg;base64,/, "");
  setStatus(
    "送信: " + out.width + "x" + out.height
    + " 元:" + vw + "x" + vh
    + (needRotate ? " [回転補正]" : " [回転なし]")
    + " b64:" + b64.length,
    "info"
  );
  return b64;
}

// ============================================================
//  図番確定・表示
// ============================================================
function displayPart(code) {
  currentPart = code;
  partInput.value = code;
  partInput.className = "";
  partInput.removeAttribute("readonly");
  document.getElementById("partHint").textContent = "修正が必要な場合は直接編集してください";
  setStatus("図番取得: " + code + "  品名を検索中...", "info");
}

function applySearchResult(data) {
  var found = data.inMaster !== undefined ? data.inMaster : data.found;
  if (found) {
    currentName = data.name || ""; currentSize = data.size || "";
    document.getElementById("infoName").textContent = data.name || "—";
    document.getElementById("infoSize").textContent = data.size || "—";
    setStatus("図番確認 ✓  数量を入力して登録してください", "ok");
  } else {
    currentName = ""; currentSize = "";
    document.getElementById("infoName").textContent = "（マスタ未登録）";
    document.getElementById("infoSize").textContent = "—";
    partInput.classList.add("notfound");
    setStatus("マスタに登録なし — 数量入力後に手動登録できます", "err");
  }
  btnSave.disabled = false;
  btnRescan.style.display = "block";
}

// ============================================================
//  手修正
// ============================================================
function onPartEdit() {
  partInput.className = "editing";
  currentPart = partInput.value.trim().toUpperCase();
  partInput.value = currentPart;
  document.getElementById("partHint").textContent = "✎ 編集中 — 外をタップで確定・再検索";
}

function onPartBlur() {
  var code = partInput.value.trim();
  if (!code || code === "----" || !partInput.classList.contains("editing")) return;
  partInput.className = "";
  currentPart = code.toUpperCase();
  partInput.value = currentPart;
  document.getElementById("partHint").textContent = "手修正確定 — 数量を入力して登録してください";
  setStatus("図番検索中...", "info");
  fetch(API, { method: "POST", body: JSON.stringify({ type: "search", part: currentPart }) })
    .then(function(r) { return r.json(); })
    .then(function(d) { applySearchResult(d); })
    .catch(function(e) { setStatus("検索エラー: " + e.message, "err"); });
}

// ============================================================
//  登録
// ============================================================
function doSave() {
  var qty    = document.getElementById("qty").value.trim();
  var dept   = document.getElementById("selDept").value;
  var person = document.getElementById("selPerson").value;
  var stock  = document.getElementById("selStock").value;

  if (!currentPart)                              { setStatus("図番が未入力です", "err"); return; }
  if (!qty || isNaN(qty) || Number(qty) < 0)    { setStatus("正しい数量を入力してください", "err"); return; }

  btnSave.disabled = true;
  setStatus("登録中...", "info");

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      type:   "save",
      part:   currentPart,
      name:   currentName,
      size:   currentSize,
      qty:    qty,
      dept:   dept,
      person: person,
      stock:  stock
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        flash("flash-ok");
        document.getElementById("successMsg").textContent = "✓ 登録完了！";
        setStatus("登録しました", "ok");
        addHistory(currentPart, currentName, qty);
        document.getElementById("qty").value = "";
        setTimeout(function() { document.getElementById("successMsg").textContent = ""; }, 2500);
      } else {
        setStatus("登録失敗: " + (d.message || "不明"), "err");
        btnSave.disabled = false;
      }
    })
    .catch(function(e) { setStatus("通信エラー: " + e.message, "err"); btnSave.disabled = false; });
}

// ============================================================
//  カメラ停止 / 再スキャン
// ============================================================
function stopCamera() {
  clearInterval(scanTimer);
  cameraReady = false;
  if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
  video.pause(); video.srcObject = null;
}

function restartScan() {
  stopCamera();
  currentPart = null; currentName = ""; currentSize = "";
  partInput.value = "----"; partInput.className = "";
  partInput.setAttribute("readonly", true);
  document.getElementById("partHint").textContent = "OCR読み取り後、手修正も可能です";
  document.getElementById("infoName").textContent = "—";
  document.getElementById("infoSize").textContent = "—";
  document.getElementById("successMsg").textContent = "";
  document.getElementById("debugWrap").style.display = "none";
  setDiag("");
  btnSave.disabled = true;
  btnRescan.style.display = "none";
  btnCamera.style.display = "block";
  btnCamera.disabled = false;
  setStatus("カメラを起動してください");
}

// ============================================================
//  履歴・フラッシュ
// ============================================================
function addHistory(part, name, qty) {
  historyLog.unshift({ part: part, name: name, qty: qty, time: new Date().toLocaleTimeString() });
  if (historyLog.length > 10) historyLog.pop();
  document.getElementById("historyArea").style.display = "block";
  document.getElementById("historyList").innerHTML = historyLog.map(function(h) {
    return '<div class="hist-item"><span>' + h.time + " " + h.part + " " + h.name + '</span><span>' + h.qty + '個</span></div>';
  }).join("");
}

function flash(cls) {
  var c = document.getElementById("container");
  c.classList.add(cls);
  setTimeout(function() { c.classList.remove(cls); }, 1500);
}
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta charset="UTF-8">
<title>棚卸OCR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #e8edf5; min-height: 100vh; padding: 16px; }
.container { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.14); transition: background 0.4s; }
.container.flash-ok  { background: #d4ffd4; }
.container.flash-err { background: #ffd4d4; }
h2 { text-align: center; font-size: 20px; font-weight: 700; color: #222; margin-bottom: 14px; }
.camera-wrap { position: relative; width: 100%; aspect-ratio: 9/4; border-radius: 12px; overflow: hidden; background: #111; margin-bottom: 10px; }
video { width: 100%; height: 100%; object-fit: cover; display: block; }
.guide { position: absolute; left: 8%; width: 84%; top: 30%; height: 38%; border: 2.5px solid #00ff88; border-radius: 8px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.35); pointer-events: none; }
.guide.scanning::after { content: ''; position: absolute; left: 0; right: 0; height: 2px; background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: scanline 1s ease-in-out infinite; }
@keyframes scanline { 0% { top: 0; opacity: 1; } 90% { top: calc(100% - 2px); opacity: 1; } 100% { top: calc(100% - 2px); opacity: 0; } }
.part-input-wrap { margin: 12px 0 4px; }
.part-input-label { font-size: 12px; color: #888; margin-bottom: 4px; }
#partInput { width: 100%; font-size: 32px; font-weight: 800; text-align: center; letter-spacing: 2px; background: #111; color: #00ff88; border: 2px solid transparent; border-radius: 10px; padding: 10px 8px; outline: none; box-sizing: border-box; font-family: monospace; transition: border-color 0.2s, color 0.2s; }
#partInput:focus { border-color: #00ff88; }
#partInput.not-found { color: #ff5555; }
#partInput.editing { border-color: #ffaa00; color: #ffaa00; }
.part-hint { font-size: 11px; color: #888; text-align: center; margin-top: 3px; }
.info-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 16px; }
.info-label { color: #888; min-width: 54px; flex-shrink: 0; }
.info-value { color: #222; font-weight: 600; }
.qty-row { margin: 14px 0 12px; display: flex; align-items: center; gap: 10px; }
.qty-row label { font-size: 16px; color: #555; white-space: nowrap; }
.qty-row input { width: 130px; padding: 12px 14px; font-size: 22px; font-weight: 700; border: 2px solid #ccc; border-radius: 10px; text-align: center; outline: none; transition: border-color 0.2s; }
.qty-row input:focus { border-color: #4477ff; }
button { width: 100%; padding: 15px; font-size: 18px; font-weight: 700; border: none; border-radius: 12px; color: #fff; cursor: pointer; transition: transform 0.1s, opacity 0.1s; margin-top: 10px; }
button:active { transform: scale(0.97); opacity: 0.85; }
button:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-camera { background: linear-gradient(135deg, #00b09b, #5cb85c); }
.btn-save   { background: linear-gradient(135deg, #ff8c00, #ffc837); }
.btn-rescan { background: linear-gradient(135deg, #3a5bff, #7b2fff); }
.status-bar { margin-top: 12px; padding: 8px 12px; border-radius: 8px; font-size: 13px; text-align: center; background: #f4f4f4; color: #555; min-height: 34px; transition: background 0.2s; }
.status-bar.ok   { background: #e0ffe0; color: #1a6e1a; }
.status-bar.err  { background: #ffe0e0; color: #8b0000; }
.status-bar.info { background: #e6f0ff; color: #224499; }
.success-msg { font-size: 22px; font-weight: 800; text-align: center; color: #1a8a1a; min-height: 30px; margin-top: 8px; }
.history { margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px; }
.history h3 { font-size: 13px; color: #999; margin-bottom: 8px; }
.history-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; border-bottom: 1px solid #f5f5f5; color: #333; }
.history-item span:last-child { font-weight: 700; color: #4477ff; }
</style>
</head>
<body>
<div class="container" id="container">
  <h2>棚卸 OCR</h2>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide" id="guide"></div>
  </div>
  <button class="btn-camera" id="btnCamera" onclick="startCamera()">📷 カメラ起動</button>
  <div id="debugArea" style="display:none;margin:8px 0;text-align:center">
    <div style="font-size:11px;color:#888;margin-bottom:4px">▼ OCRに送っている画像</div>
    <canvas id="debugCanvas" style="max-width:100%;border:1px solid #ccc;border-radius:6px"></canvas>
  </div>
  <div class="part-input-wrap">
    <div class="part-input-label">図番</div>
    <input id="partInput" type="text" value="----" readonly placeholder="読み取り待ち..." oninput="onPartEdit()" onblur="onPartBlur()">
    <div class="part-hint" id="partHint">OCR読み取り後、手修正も可能です</div>
  </div>
  <div class="info-row"><span class="info-label">品名</span><span class="info-value" id="infoName">—</span></div>
  <div class="info-row"><span class="info-label">サイズ</span><span class="info-value" id="infoSize">—</span></div>
  <div class="qty-row">
    <label for="qty">数量</label>
    <input id="qty" type="number" inputmode="numeric" placeholder="0" min="0">
  </div>
  <button class="btn-save"   id="btnSave"   onclick="save()"        disabled>📦 登録</button>
  <button class="btn-rescan" id="btnRescan" onclick="restartScan()" style="display:none">🔄 再スキャン</button>
  <div class="status-bar" id="statusBar">カメラを起動してください</div>
  <!-- 診断表示エリア（解決後に削除） -->
  <div id="diagArea" style="display:none;margin-top:6px;padding:8px;background:#fff3cd;border-radius:6px;font-size:11px;color:#333;word-break:break-all;line-height:1.6"></div>
  <div class="success-msg" id="successMsg"></div>
  <div class="history" id="history" style="display:none">
    <h3>登録履歴（今回分）</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ★ デプロイURLをここに貼る
var API = "https://script.google.com/macros/s/AKfycbzeh9dQ1pK03mqOsuBCN-Na5AOeiiV1eOLpj7WAWW7YlyoTQE4euRIf5c_ImijbHllE/exec";

var mediaStream   = null;
var scanTimer     = null;
var isScanning    = false;
var cameraReady   = false;
var currentPart   = null;
var currentName   = "";
var currentSize   = "";
var lastHash      = "";
var sameCount     = 0;
var lastCandidate = null;
var historyLog    = [];

var video     = document.getElementById("video");
var guide     = document.getElementById("guide");
var partInput = document.getElementById("partInput");
var statusBar = document.getElementById("statusBar");
var btnSave   = document.getElementById("btnSave");
var btnRescan = document.getElementById("btnRescan");
var btnCamera = document.getElementById("btnCamera");

function setStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = "status-bar " + (type || "");
}

// ====================================================
//  カメラ起動
//  ★修正：onloadedmetadata + play() 完了後にスキャン開始
// ====================================================
function startCamera() {
  setStatus("カメラ起動中...", "info");
  btnCamera.disabled = true;
  cameraReady = false;

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1920 } }
  }).then(function(stream) {
    mediaStream = stream;
    video.srcObject = stream;

    video.onloadedmetadata = function() {
      video.play().then(function() {
        cameraReady = true;
        setStatus("スキャン中... ガイド枠内に図番を合わせてください", "info");
        btnCamera.style.display = "none";
        btnRescan.style.display = "none";
        startAutoScan();
      }).catch(function(err) {
        setStatus("再生失敗: " + err.message, "err");
        btnCamera.disabled = false;
      });
    };

  }).catch(function(err) {
    setStatus("カメラ起動失敗: " + err.message, "err");
    btnCamera.disabled = false;
  });
}

function startAutoScan() {
  clearInterval(scanTimer);
  isScanning = false;
  scanTimer = setInterval(doScan, 1500);
}

// ====================================================
//  スキャン実行
// ====================================================
function doScan() {
  // cameraReady + videoWidth の両方で確実にガード
  if (isScanning || !cameraReady || !video.videoWidth || !video.videoHeight) return;

  isScanning = true;
  guide.classList.add("scanning");

  var base64 = captureGuideArea();
  if (!base64) { isScanning = false; guide.classList.remove("scanning"); return; }

  var hash = base64.substring(0, 100);
  if (hash === lastHash) { isScanning = false; guide.classList.remove("scanning"); return; }
  lastHash = hash;

  setStatus("OCR解析中...", "info");

  postToGas({ type: "ocr_search", image: base64 })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        setStatus("OCRエラー: " + (data.message || "不明"), "err");
        return;
      }

      if (data.part) {
        if (data.part === lastCandidate) {
          sameCount++;
        } else {
          sameCount = 1;
          lastCandidate = data.part;
        }
        if (sameCount >= 2) {
          stopCamera();
          guide.classList.remove("scanning");
          sameCount = 0;
          lastCandidate = null;
          displayPart(data.part);
          applySearchResult(data);
        } else {
          setStatus("図番候補: " + data.part + "　確認中...", "info");
        }
      } else {
        sameCount = 0;
        if (data.rawText && data.rawText.trim()) {
          var rv = data.rawText.replace(/\n/g, " ").trim();
          setStatus("OCR生テキスト: [" + rv.substring(0, 80) + "]", "err");
          partInput.value = rv.substring(0, 40);
          partInput.removeAttribute("readonly");
          partInput.className = "editing";
          document.getElementById("partHint").textContent = "図番部分を残して修正 → 入力欄の外をタップで確定";
          btnSave.disabled        = false;
          btnRescan.style.display = "block";
          stopCamera();
        } else {
          setStatus("テキスト未読取 — 明るい場所でガイド枠に図番を合わせてください");
        if (data.diag) {
          var da = document.getElementById("diagArea");
          da.style.display = "block";
          da.innerHTML = "【診断】" + (data.diag.diagText || JSON.stringify(data.diag));
        }
        }
      }
    })
    .catch(function(err) {
      setStatus("通信エラー: " + err.message, "err");
    })
    .finally(function() {
      isScanning = false;
      guide.classList.remove("scanning");
    });
}

// ====================================================
//  ガイド枠キャプチャ（object-fit:cover補正済み）
// ====================================================
function captureGuideArea() {
  if (!video.videoWidth || !video.videoHeight) return null;
  var vw = video.videoWidth, vh = video.videoHeight;
  var vrect = video.getBoundingClientRect();
  var scale = Math.max(vrect.width / vw, vrect.height / vh);
  var overX = (vw * scale - vrect.width)  / 2;
  var overY = (vh * scale - vrect.height) / 2;
  var grect = guide.getBoundingClientRect();
  var sx = (grect.left - vrect.left + overX) / scale;
  var sy = (grect.top  - vrect.top  + overY) / scale;
  var sw = grect.width  / scale;
  var sh = grect.height / scale;
  var csx = Math.max(0, Math.round(sx));
  var csy = Math.max(0, Math.round(sy));
  var csw = Math.min(vw - csx, Math.round(sw));
  var csh = Math.min(vh - csy, Math.round(sh));
  if (csw <= 10 || csh <= 10) return null;

  var crop = document.createElement("canvas");
  crop.width = csw; crop.height = csh;
  var ctx = crop.getContext("2d");
  ctx.drawImage(video, csx, csy, csw, csh, 0, 0, csw, csh);
  // enhanceImage(ctx, csw, csh); // ★診断中：前処理無効

  var MAX = 800, send = crop;
  if (csw > MAX || csh > MAX) {
    var r = Math.min(MAX / csw, MAX / csh);
    send = document.createElement("canvas");
    send.width = Math.round(csw * r); send.height = Math.round(csh * r);
    send.getContext("2d").drawImage(crop, 0, 0, send.width, send.height);
  }

  var dbg = document.getElementById("debugCanvas");
  if (dbg) {
    dbg.width = send.width; dbg.height = send.height;
    dbg.getContext("2d").drawImage(send, 0, 0);
    document.getElementById("debugArea").style.display = "block";
  }

  return send.toDataURL("image/jpeg", 0.75).replace(/^data:image\/jpeg;base64,/, "");
}

// ====================================================
//  画像前処理（グレースケール＋アンシャープ＋コントラスト）
// ====================================================
function enhanceImage(ctx, w, h) {
  var d = ctx.getImageData(0, 0, w, h).data;
  var imgData = ctx.getImageData(0, 0, w, h);
  d = imgData.data;
  var gray = new Float32Array(w * h);
  for (var i = 0; i < d.length; i += 4)
    gray[i >> 2] = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
  var blurred = new Float32Array(w * h);
  for (var y = 0; y < h; y++) for (var x = 0; x < w; x++) {
    var s = 0, c = 0;
    for (var dy = -1; dy <= 1; dy++) for (var dx = -1; dx <= 1; dx++) {
      var ny = y+dy, nx = x+dx;
      if (ny>=0&&ny<h&&nx>=0&&nx<w){s+=gray[ny*w+nx];c++;}
    }
    blurred[y*w+x] = s/c;
  }
  for (var k = 0; k < gray.length; k++)
    gray[k] = Math.min(255, Math.max(0, gray[k]*2.5 - blurred[k]*1.5));
  var mn=255, mx=0;
  for (var m = 0; m < gray.length; m++){if(gray[m]<mn)mn=gray[m];if(gray[m]>mx)mx=gray[m];}
  var rng = mx - mn || 1;
  for (var n = 0; n < gray.length; n++){var v=Math.round((gray[n]-mn)/rng*255);var p=n*4;d[p]=d[p+1]=d[p+2]=v;}
  ctx.putImageData(imgData, 0, 0);
}

function displayPart(code) {
  currentPart = code;
  partInput.value = code;
  partInput.className = "";
  partInput.removeAttribute("readonly");
  document.getElementById("partHint").textContent = "修正が必要な場合は直接編集してください";
  setStatus("図番取得: " + code + "　品名を検索中...", "info");
}

function onPartEdit() {
  partInput.className = "editing";
  currentPart = partInput.value.trim().toUpperCase();
  partInput.value = currentPart;
  document.getElementById("partHint").textContent = "✎ 編集中 — 入力欄の外をタップで確定・再検索";
}

function onPartBlur() {
  var code = partInput.value.trim();
  if (!code || code === "----") return;
  if (partInput.classList.contains("editing")) {
    partInput.className = "";
    currentPart = code.toUpperCase();
    partInput.value = currentPart;
    document.getElementById("partHint").textContent = "手修正確定 — 数量を入力して登録してください";
    searchAndApply(currentPart);
  }
}

function searchAndApply(code) {
  setStatus("図番検索中...", "info");
  postToGas({ type: "search", part: code })
    .then(function(res) { return res.json(); })
    .then(function(data) { applySearchResult(data); })
    .catch(function(err) { setStatus("検索エラー: " + err.message, "err"); btnRescan.style.display = "block"; });
}

function applySearchResult(data) {
  var inMaster = data.inMaster !== undefined ? data.inMaster : data.found;
  if (inMaster) {
    currentName = data.name || ""; currentSize = data.size || "";
    document.getElementById("infoName").textContent = data.name || "—";
    document.getElementById("infoSize").textContent = data.size || "—";
    setStatus("図番確認 ✓ 数量を入力して登録してください", "ok");
  } else {
    currentName = ""; currentSize = "";
    document.getElementById("infoName").textContent = "（マスタ未登録）";
    document.getElementById("infoSize").textContent = "—";
    partInput.classList.add("not-found");
    setStatus("マスタに登録なし — 数量入力後に手動登録できます", "err");
  }
  btnSave.disabled = false;
  btnRescan.style.display = "block";
}

function save() {
  var qty = document.getElementById("qty").value.trim();
  if (!currentPart) { setStatus("図番が読み取れていません", "err"); return; }
  if (!qty || isNaN(qty) || Number(qty) < 0) { setStatus("正しい数量を入力してください", "err"); return; }
  btnSave.disabled = true;
  setStatus("登録中...", "info");
  postToGas({ type: "save", part: currentPart, name: currentName, size: currentSize, qty: qty })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        flashContainer("flash-ok");
        document.getElementById("successMsg").textContent = "✓ 登録完了！";
        setStatus("登録しました", "ok");
        addHistory(currentPart, currentName, qty);
        document.getElementById("qty").value = "";
        setTimeout(function() { document.getElementById("successMsg").textContent = ""; }, 2500);
      } else {
        setStatus("登録失敗: " + (data.message || "不明"), "err");
        btnSave.disabled = false;
      }
    })
    .catch(function(err) { setStatus("通信エラー: " + err.message, "err"); btnSave.disabled = false; });
}

function stopCamera() {
  clearInterval(scanTimer);
  cameraReady = false;
  if (mediaStream) { mediaStream.getTracks().forEach(function(t){ t.stop(); }); mediaStream = null; }
  video.pause();
  video.srcObject = null;
}

function restartScan() {
  currentPart = null; currentName = ""; currentSize = "";
  partInput.value = "----"; partInput.className = "";
  partInput.setAttribute("readonly", true);
  document.getElementById("partHint").textContent = "OCR読み取り後、手修正も可能です";
  document.getElementById("infoName").textContent = "—";
  document.getElementById("infoSize").textContent = "—";
  document.getElementById("successMsg").textContent = "";
  btnSave.disabled = true;
  btnRescan.style.display = "none";
  btnCamera.style.display = "block";
  btnCamera.disabled = false;
  lastHash = ""; sameCount = 0; lastCandidate = null;
  setStatus("カメラを起動してください");
}

function addHistory(part, name, qty) {
  historyLog.unshift({ part: part, name: name, qty: qty, time: new Date().toLocaleTimeString() });
  if (historyLog.length > 10) historyLog.pop();
  document.getElementById("history").style.display = "block";
  document.getElementById("historyList").innerHTML = historyLog.map(function(h) {
    return '<div class="history-item"><span>' + h.time + ' ' + h.part + ' ' + h.name + '</span><span>' + h.qty + '個</span></div>';
  }).join("");
}

function flashContainer(cls) {
  var c = document.getElementById("container");
  c.classList.add(cls);
  setTimeout(function() { c.classList.remove(cls); }, 1500);
}

// CORS対策：Content-Typeヘッダーなし
function postToGas(body) {
  return fetch(API, { method: "POST", body: JSON.stringify(body) });
}
</script>
</body>
</html>

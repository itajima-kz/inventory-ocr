<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>棚卸OCR（高速版）</title>

<style>
body{
font-family:sans-serif;
background:#eef1ff;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 12px 35px rgba(0,0,0,0.2);
}

.cameraBox{
position:relative;
width:100%;
height:300px;
overflow:hidden;
border-radius:10px;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* OCR範囲最適化 */
.ocrGuide{
position:absolute;
border:3px solid #00ff88;
width:70%;
height:20%;
top:40%;
left:15%;
border-radius:8px;
}

.bigPart{
font-size:48px;
font-weight:bold;
text-align:center;
margin:15px 0;
background:#000;
color:#00ff88;
padding:8px;
border-radius:8px;
}

button{
width:100%;
padding:16px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.btnCamera{background:#00b09b;}
.btnSave{background:#ff8008;}
.btnRescan{background:#396afc;}

</style>
</head>

<body>

<div class="container">

<h2>棚卸OCR（高速版）</h2>

<div class="cameraBox">
<video id="video" autoplay playsinline></video>
<div class="ocrGuide" id="guide"></div>
</div>

<button class="btnCamera" onclick="startCamera()">📷 カメラ起動</button>

<div class="bigPart" id="bigPart">----</div>

<div>品名: <span id="name"></span></div>
<div>サイズ: <span id="size"></span></div>

<input id="qty" placeholder="数量">

<button class="btnSave" onclick="save()">📦 登録</button>
<button class="btnRescan" onclick="restartScan()">🔄 再スキャン</button>

<div id="status"></div>

</div>

<script>

const API="【GASのURLを貼る】";

let video=document.getElementById("video")
let stream
let scanning=false
let timer
let part,name,size

function status(t){
document.getElementById("status").innerText=t
}

/* =============================
   カメラ起動
============================= */
async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream

startAutoScan()

}

/* =============================
   高速スキャン
============================= */
function startAutoScan(){

timer=setInterval(()=>{
if(!scanning){
scan()
}
},700)

}

/* =============================
   OCR処理（高速＆高精度）
============================= */
async function scan(){

if(!video.videoWidth)return

scanning=true

status("OCR中...")

/* 解像度縮小 */
const canvas=document.createElement("canvas")
const scale=640/video.videoWidth

canvas.width=640
canvas.height=video.videoHeight*scale

const ctx=canvas.getContext("2d")
ctx.drawImage(video,0,0,canvas.width,canvas.height)

/* ガイド枠 */
const guide=document.getElementById("guide")
const rect=guide.getBoundingClientRect()
const vrect=video.getBoundingClientRect()

const scaleX=canvas.width/vrect.width
const scaleY=canvas.height/vrect.height

const sx=(rect.left-vrect.left)*scaleX
const sy=(rect.top-vrect.top)*scaleY
const sw=rect.width*scaleX
const sh=rect.height*scaleY

/* 切り出し */
const crop=document.createElement("canvas")
crop.width=sw
crop.height=sh

const cctx=crop.getContext("2d")
cctx.drawImage(canvas,sx,sy,sw,sh,0,0,sw,sh)

/* OCR最適二値化 */
const imgData=cctx.getImageData(0,0,sw,sh)
const d=imgData.data

for(let i=0;i<d.length;i+=4){

const gray=(d[i]+d[i+1]+d[i+2])/3
const bin=gray>120?255:0

d[i]=bin
d[i+1]=bin
d[i+2]=bin

}

cctx.putImageData(imgData,0,0)

/* 軽量化 */
const base64=crop
.toDataURL("image/jpeg",0.7)
.replace(/^data:image\/jpeg;base64,/,"")

/* API */
const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"ocr",
image:base64
})
})

const data=await res.json()

if(data.part){

stopCamera()

document.getElementById("bigPart").innerText=data.part

search(data.part)
}

scanning=false

}

/* =============================
   停止
============================= */
function stopCamera(){

clearInterval(timer)

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

video.pause()

}

/* =============================
   再スキャン
============================= */
function restartScan(){
location.reload()
}

/* =============================
   図番検索
============================= */
async function search(code){

status("検索中...")

const res=await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"search",
part:code
})
})

const data=await res.json()

if(!data.found){
status("未登録")
return
}

part=data.part
name=data.name
size=data.size

document.getElementById("name").innerText=name
document.getElementById("size").innerText=size

status("OK")

}

/* =============================
   保存
============================= */
async function save(){

const qty=document.getElementById("qty").value

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"save",
part:part,
name:name,
size:size,
qty:qty
})
})

status("登録完了")

}

</script>

</body>
</html>
